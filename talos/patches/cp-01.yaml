cluster:
  # Disable Talos' bundled CNI (Flannel) and kube-proxy so Cilium can act as
  # the CNI *and* the kube-proxy replacement. These are cluster-bootstrap
  # settings — only the control plane applies the CNI/kube-proxy manifests, so
  # they live here rather than in the worker patches. Do NOT re-enable either;
  # Cilium owns both. See infrastructure/releases/cilium/.
  network:
    cni:
      name: none
  proxy:
    disabled: true
  # Keep heavy workloads off the control-plane node (4 cores vs workers' 12).
  # false re-applies the node-role.kubernetes.io/control-plane:NoSchedule taint;
  # admit specific infra pods back with a matching toleration if needed. See #28.
  allowSchedulingOnControlPlanes: false
  apiServer:
    admissionControl:
      - name: PodSecurity
        configuration:
          apiVersion: pod-security.admission.config.k8s.io/v1alpha1
          kind: PodSecurityConfiguration
          exemptions:
            namespaces:
              - infra

machine:
  network:
    hostname: talos-cp-01
  # Data Path Mounts
  # Provide additional data path mounts accessible to the Kubernetes Kubelet container.
  # These mounts are necessary to provide access to the host directories,
  # and attach volumes required by Longhorn components.
  kubelet:
    extraMounts:
      - destination: /var/lib/longhorn
        type: bind
        source: /var/lib/longhorn
        options:
          - bind
          - rshared
          - rw