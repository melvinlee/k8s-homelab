repositories:
  - name: grafana
    url: https://grafana.github.io/helm-charts

releases:
  - name: grafana
    namespace: monitoring
    chart: grafana/grafana
    version: 10.5.15
    values:
      - values.yaml
      # secrets file is gitignored — admin credentials in resources/secret.yaml
      - resources/secret.yaml
    hooks:
      # HTTPRoute for Grafana via the homelab Gateway (replaces nginx Ingress).
      - events: ["postsync"]
        command: kubectl
        args:
          - apply
          - -f
          - '{{ requiredEnv "PWD" }}/releases/grafana/resources/httproute.yaml'
        showlogs: true
