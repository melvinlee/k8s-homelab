repositories:
  - name: mojo2600
    url: https://mojo2600.github.io/pihole-kubernetes/

releases:
  - name: pihole
    namespace: infra
    chart: mojo2600/pihole
    version: 2.18.0
    values:
      - values.yaml
    hooks:
      - events: ["presync"]
        command: kubectl
        args:
          - apply
          - -f
          - '{{ requiredEnv "PWD" }}/releases/pihole/resources/custom-dns-configmap.yaml'
        showlogs: true