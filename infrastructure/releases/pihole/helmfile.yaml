repositories:
  - name: mojo2600
    url: https://mojo2600.github.io/pihole-kubernetes/

releases:
  - name: pihole
    namespace: infra
    chart: mojo2600/pihole
    version: 2.36.0
    values:
      - values.yaml
    hooks:
      # HTTPRoute for the Pi-hole admin UI via the homelab Gateway (replaces nginx Ingress).
      - events: ["postsync"]
        command: kubectl
        args:
          - apply
          - -f
          - '{{ requiredEnv "PWD" }}/releases/pihole/resources/httproute.yaml'
        showlogs: true