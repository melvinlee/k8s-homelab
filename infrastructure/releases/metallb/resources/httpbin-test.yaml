---
apiVersion: v1
kind: Namespace
metadata:
  name: metallb-test
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: httpbin
  namespace: metallb-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: httpbin
  template:
    metadata:
      labels:
        app: httpbin
    spec:
      containers:
        - name: httpbin
          image: kennethreitz/httpbin:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: httpbin
  namespace: metallb-test
spec:
  type: LoadBalancer
  selector:
    app: httpbin
  ports:
    - name: http
      port: 80
      targetPort: 80
