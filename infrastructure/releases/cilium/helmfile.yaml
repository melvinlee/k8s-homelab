# Cilium — CNI + kube-proxy replacement + LoadBalancer (L2 announcements).
# Replaces both Talos' default Flannel/kube-proxy and the MetalLB release.
repositories:
  - name: cilium
    url: https://helm.cilium.io

releases:
  - name: cilium
    namespace: kube-system
    chart: cilium/cilium
    # Pin to a recent stable release; verify against https://github.com/cilium/cilium/releases
    version: 1.17.1
    values:
      - values.yaml
    hooks:
      # Install Gateway API CRDs before the chart runs so Cilium can register
      # the cilium GatewayClass on startup.
      - events: ["presync"]
        command: 'bash'
        args:
          - '{{ requiredEnv "PWD" }}/releases/cilium/gateway-crds.sh'
        showlogs: true
      # Apply the LoadBalancer IP pool + L2 announcement policy, then stand up
      # the homelab Gateway once the cilium GatewayClass is Accepted.
      - events: ["postsync"]
        command: 'bash'
        args:
          - '{{ requiredEnv "PWD" }}/releases/cilium/config.sh'
        showlogs: true
