---
# Single cluster-wide HTTP Gateway served by Cilium's built-in Gateway controller.
# All app HTTPRoutes across namespaces attach to this Gateway via parentRefs.
# The Gateway gets a LoadBalancer IP from the Cilium L2 pool (192.168.1.200-250).
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: homelab
  namespace: infra
spec:
  gatewayClassName: cilium
  # Pin to .200 (the former nginx-internal IP) so all *.home DNS records
  # continue to resolve correctly without any DNS changes.
  addresses:
    - type: IPAddress
      value: "192.168.1.200"
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      # Allow HTTPRoutes from any namespace to attach (apps span monitoring,
      # langfuse, longhorn-system, and infra).
      allowedRoutes:
        namespaces:
          from: All
